// Quake 3 Relay Test Server Configuration

// Basic server settings
set sv_hostname "Quake 3 Relay Test Server"
set g_needpass "0"
set g_password ""
set sv_maxclients "16"
set sv_maxRate "0"
set sv_minPing "0"
set sv_maxPing "0"

// Game settings
set g_gametype "0"
set g_fraglimit "0"
set g_timelimit "0"
set g_duel "0"
set g_interview "0"
set g_needpass "0"

// Map settings
set mapname "q3dm1"
set map "q3dm1"

// Server behavior
set sv_pure "1"
set sv_cheats "0"
set g_allowVote "1"
set g_quadfactor "1"

// Anti-cheat
set sv_strictAuth "1"
set sv_allowDownload "1"
set sv_maxFileSize "0"

// Gameplay
set g_knockback "1000"
set g_speed "320"
set g_acceleration "10"
set g_wateracceleration "4"
set g_gravity "800"
set g_weaponTeamRespawn "30"
set g_forcerespawn "20"
set g_inactivity "0"
set g_warmup "20"

// Network settings
set net_port "27960"
set sv_floodprotect "1"
set sv_allowDownload "1"

// Start game
map q3dm1

// Map rotation (optional)
// exec maprotation.cfg

// Load mod configuration (if using mods)
// exec mod.cfg
