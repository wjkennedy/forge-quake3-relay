version: '3.8'

services:
  # ioquake3 game server
  ioquake3:
    build:
      context: ./docker/ioquake3
      dockerfile: Dockerfile
    container_name: quake3-server
    ports:
      - "27960:27960/udp"  # Game port
    environment:
      - GAME_PORT=27960
    networks:
      - quake3-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-zu", "localhost", "27960"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # Quake 3 WebSocket-to-UDP relay
  relay:
    image: node:20-alpine
    container_name: quake3-relay
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts
      - ./node_modules:/app/node_modules
    ports:
      - "8080:8080"  # WebSocket port
    environment:
      - TARGET_HOST=ioquake3
      - TARGET_PORT=27960
      - PROXY_PORT=8080
      - PROXY_HOST=0.0.0.0
      - DEBUG=true
    depends_on:
      - ioquake3
    networks:
      - quake3-network
    command: sh -c "sleep 5 && node scripts/relay-server-enhanced.mjs"
    restart: unless-stopped

networks:
  quake3-network:
    driver: bridge
